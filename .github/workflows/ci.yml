name: CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: read
  packages: write
  security-events: write

jobs:
  api:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        working-directory: ./api
        run: npm install

      - name: Run tests
        working-directory: ./api
        run: npm test --if-present

      - name: Scan for vulnerabilities
        working-directory: ./api
        run: npm audit --audit-level=high

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./api
          push: true
          tags: |
            ghcr.io/${{ github.repository_owner }}/project460/api:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/project460/api:latest

  dashboard:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dashboard dependencies
        working-directory: ./dashboard
        run: npm install --loglevel verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run dashboard tests
        working-directory: ./dashboard
        run: npm test --if-present --passWithNoTests --loglevel verbose
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Scan for vulnerabilities
        working-directory: ./dashboard
        run: npm audit --audit-level=high || true

      - name: Log in to GitHub Container Registry
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        if: github.event_name == 'push'
        uses: docker/build-push-action@v5
        with:
          context: ./dashboard
          push: true
          build-args: |
            REACT_APP_API_URL=http://localhost:8080
          tags: |
            ghcr.io/${{ github.repository_owner }}/project460/dashboard:${{ github.sha }}
            ghcr.io/${{ github.repository_owner }}/project460/dashboard:latest

  deploy-test:
    runs-on: ubuntu-latest
    needs: [api, dashboard]
    if: github.event_name == 'push'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Compose
        run: |
          sudo apt-get update
          sudo apt-get install -y docker-compose

      - name: Prepare environment
        run: |
          echo "DB_PASSWORD=test_password" > .env
          echo "DB_USER=test_user" >> .env
          echo "DB_NAME=test_db" >> .env

      - name: Start services for testing
        run: |
          # Use the local docker-compose but override images with the ones we just built
          # For testing, we can use the local context to ensure the build we just tested works
          docker-compose up -d --build
        env:
          REACT_APP_API_URL: http://localhost:8080

      - name: Wait for services to be ready
        run: |
          # Give the database and API time to start
          sleep 30
          docker-compose ps

      - name: Verify API Health
        run: |
          curl --fail http://localhost:8080/metrics || (docker-compose logs api && exit 1)

      - name: Verify Dashboard Health
        run: |
          curl --fail http://localhost:3000 || (docker-compose logs dashboard && exit 1)

      - name: Shut down services
        if: always()
        run: docker-compose down

  security-scan:
    runs-on: ubuntu-latest
    needs: [api, dashboard]
    permissions:
      security-events: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
