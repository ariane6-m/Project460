services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: moto_user
      POSTGRES_PASSWORD: moto_password
      POSTGRES_DB: motomoto
    volumes:
      - postgres_data:/var/lib/postgresql/data

  api:
    build: ./api
    ports:
      - "8080:8080"
    environment:
      NODE_ENV: development
      DB_HOST: db
      DB_USER: moto_user
      DB_PASSWORD: moto_password
      DB_NAME: motomoto
    volumes:
      - ./api:/usr/src/app
      - /usr/src/app/node_modules
    depends_on:
      - db
    extra_hosts:
      - "host.docker.internal:host-gateway"

  dashboard:
    build:
      context: ./dashboard
      dockerfile: Dockerfile
      args:
        - REACT_APP_API_URL=http://34.133.36.174:8080
    ports:
      - "3000:3000"
    environment:
      REACT_APP_API_URL: http://34.133.36.174:8080
      WATCHPACK_POLLING: 1  # Enable file watching in containers
    volumes:
      - /app/node_modules
    depends_on:
      - api
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  postgres_data:
